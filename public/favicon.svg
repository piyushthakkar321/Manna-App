<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark brown background with rounded corners -->
  <rect width="512" height="512" rx="115" ry="115" fill="#2C1F0E"/>
  <!-- Subtle inner glow border -->
  <rect width="512" height="512" rx="115" ry="115" fill="none" stroke="#B8860B" stroke-width="12" stroke-opacity="0.3"/>
  <!-- Gold cross — vertical bar -->
  <rect x="224" y="96" width="64" height="320" rx="12" ry="12" fill="#D4A942"/>
  <!-- Gold cross — horizontal bar -->
  <rect x="128" y="176" width="256" height="64" rx="12" ry="12" fill="#D4A942"/>
  <!-- Subtle inner highlight on cross -->
  <rect x="228" y="96" width="56" height="312" rx="10" ry="10" fill="#E8C060" fill-opacity="0.2"/>
  <rect x="128" y="180" width="248" height="56" rx="10" ry="10" fill="#E8C060" fill-opacity="0.2"/>
</svg>